name: Daily Marketing Bot

on:
  schedule:
    # 8:00 AM CET (7:00 UTC in winter, 6:00 UTC in summer)
    - cron: "0 7 * * *"  # Question post
    - cron: "0 9 * * *"  # Answer reveal (2h later)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "question"
        type: choice
        options:
          - question
          - answer
          - cards-only
          - full

jobs:
  marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Determine mode
        id: mode
        env:
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${INPUT_MODE}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "07" ]; then
              echo "mode=question" >> "$GITHUB_OUTPUT"
            else
              echo "mode=answer" >> "$GITHUB_OUTPUT"
            fi
          fi

      # Question post (8 AM CET)
      - name: Post question to Discord
        if: steps.mode.outputs.mode == 'question' || steps.mode.outputs.mode == 'full'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/post-discord-webhook.mjs

      # Answer reveal (10 AM CET)
      - name: Post answer to Discord
        if: steps.mode.outputs.mode == 'answer' || steps.mode.outputs.mode == 'full'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/post-discord-webhook.mjs --answer

      # Generate social media cards
      - name: Generate social cards
        if: steps.mode.outputs.mode == 'cards-only' || steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'question'
        run: npx tsx scripts/generate-social-cards.mjs --all

      - name: Upload cards artifact
        if: steps.mode.outputs.mode == 'cards-only' || steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'question'
        uses: actions/upload-artifact@v4
        with:
          name: social-cards-${{ github.run_number }}
          path: marketing/cards/
          retention-days: 30
