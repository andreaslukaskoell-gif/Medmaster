name: Daily Marketing Bot

on:
  schedule:
    # 8:00 AM CET (7:00 UTC in winter, 6:00 UTC in summer)
    - cron: "0 7 * * *"  # Question post + Instagram
    - cron: "0 9 * * *"  # Answer reveal (2h later)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "question"
        type: choice
        options:
          - question
          - answer
          - cards-only
          - instagram-only
          - full

jobs:
  marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Determine mode
        id: mode
        env:
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${INPUT_MODE}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "07" ]; then
              echo "mode=question" >> "$GITHUB_OUTPUT"
            else
              echo "mode=answer" >> "$GITHUB_OUTPUT"
            fi
          fi

      # Generate social media cards (needed for Instagram)
      - name: Generate social cards
        if: steps.mode.outputs.mode != 'answer'
        run: npx tsx scripts/generate-social-cards.mjs --all

      # Question post (8 AM CET)
      - name: Post question to Discord
        if: steps.mode.outputs.mode == 'question' || steps.mode.outputs.mode == 'full'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/post-discord-webhook.mjs

      # Answer reveal (10 AM CET)
      - name: Post answer to Discord
        if: steps.mode.outputs.mode == 'answer' || steps.mode.outputs.mode == 'full'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/post-discord-webhook.mjs --answer

      # Instagram carousel (question + answer card)
      - name: Post to Instagram
        if: steps.mode.outputs.mode == 'question' || steps.mode.outputs.mode == 'instagram-only' || steps.mode.outputs.mode == 'full'
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: npx tsx scripts/post-instagram.mjs

      - name: Upload cards artifact
        if: steps.mode.outputs.mode != 'answer'
        uses: actions/upload-artifact@v4
        with:
          name: social-cards-${{ github.run_number }}
          path: marketing/cards/
          retention-days: 30

  # Refresh Instagram token monthly (before 60-day expiry)
  refresh-token:
    if: github.event.schedule == '0 7 * * *' && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    # Only run on 1st and 15th of month
    steps:
      - name: Check if token refresh day
        id: check
        run: |
          DAY=$(date -u +%d)
          if [ "$DAY" = "01" ] || [ "$DAY" = "15" ]; then
            echo "refresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "refresh=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.refresh == 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.refresh == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.refresh == 'true'
        run: npm ci

      - name: Check token expiry
        if: steps.check.outputs.refresh == 'true'
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: npx tsx scripts/refresh-ig-token.mjs --check
