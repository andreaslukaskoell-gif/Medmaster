name: Post Instagram Reels

on:
  schedule:
    # 1x daily at 14:00 CET = 13:00 UTC (reduced from 3x based on performance data)
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot to post (1 only — single daily post)"
        required: true
        default: "1"

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine composition
        id: plan
        run: node scripts/ci-reel-plan.mjs
        env:
          INPUT_SLOT: "1"
          EVENT_NAME: ${{ github.event_name }}

      - name: Extract BMS data
        run: npx tsx --tsconfig tsconfig.app.json video/extract-data.mts

      - name: Render reel
        run: node video/render.mjs --comp "$COMP"
        env:
          COMP: ${{ steps.plan.outputs.comp }}

      - name: Upload and post to Instagram
        run: node scripts/ci-post-reel.mjs
        env:
          COMP: ${{ steps.plan.outputs.comp }}
