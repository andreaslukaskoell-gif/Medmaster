name: Post Instagram Reels

on:
  schedule:
    # 1x daily at 14:00 CET = 13:00 UTC
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Extract BMS data
        run: npx tsx --tsconfig tsconfig.app.json video/extract-data.mts

      - name: Select, render, and post (performance-driven)
        run: node scripts/post-reel-smart.mjs --ci
