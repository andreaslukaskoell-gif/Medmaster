<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3ea7"/>
      <stop offset="100%" style="stop-color:#3655b2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- M letter - bold, modern -->
  <text x="200" y="235" text-anchor="middle" font-family="system-ui, -apple-system, Arial, sans-serif" font-weight="800" font-size="180" fill="white" letter-spacing="-8">M</text>

  <!-- Small plus/cross accent (medical) -->
  <g transform="translate(305, 95)">
    <rect x="-4" y="-14" width="8" height="28" rx="3" fill="url(#accent)"/>
    <rect x="-14" y="-4" width="28" height="8" rx="3" fill="url(#accent)"/>
  </g>
</svg>
