    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
      @media(prefers-color-scheme:dark){body{background:#0f172a}}
      /* Spinner for non-landing routes */
      #root-loader{display:flex;align-items:center;justify-content:center;min-height:100vh}
      #root-loader svg{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      /* Static landing — visible instantly, hidden when React mounts */
      #static-landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:linear-gradient(135deg,#1b3ea7 0%,#0f2a80 100%);color:#fff}
      #static-landing h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:800;margin-bottom:12px;letter-spacing:-0.02em}
      #static-landing p{font-size:clamp(1rem,3vw,1.25rem);opacity:0.85;max-width:520px;line-height:1.5;margin-bottom:32px}
      #static-landing .stats{display:flex;gap:24px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
      #static-landing .stat{background:rgba(255,255,255,0.12);border-radius:12px;padding:12px 20px}
      #static-landing .stat b{display:block;font-size:1.5rem}
      #static-landing .stat span{font-size:0.8rem;opacity:0.7}
      #static-landing .cta{display:inline-block;background:#fff;color:#1b3ea7;font-weight:700;font-size:1.1rem;padding:14px 36px;border-radius:12px;text-decoration:none;transition:transform 0.15s}
      #static-landing .cta:hover{transform:scale(1.03)}
      #static-landing .sub{margin-top:16px;font-size:0.85rem;opacity:0.6}
    </style>
    <!-- Google Identity Services (popup login, no redirect to supabase URL) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <!-- Static landing page: renders instantly without JS, replaced by React -->
    <div id="static-landing">
      <h1>MedMaster</h1>
      <p>MedAT 2026 Vorbereitung — 4.300+ Fragen, alle 4 Testbereiche, KI-adaptives Lernen.</p>
      <div class="stats">
        <div class="stat"><b>4.300+</b><span>Übungsfragen</span></div>
        <div class="stat"><b>4</b><span>Testbereiche</span></div>
        <div class="stat"><b>174</b><span>Lernkapitel</span></div>
      </div>
      <a class="cta" href="/register">Kostenlos starten</a>
      <div class="sub">Bereits registriert? <a href="/login" style="color:#fff;text-decoration:underline">Anmelden</a></div>
    </div>
    <div id="root" style="display:none">
      <div id="root-loader">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="#e2e8f0" stroke-width="4" />
          <path d="M20 2a18 18 0 0 1 18 18" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // When React mounts, hide static landing and show React root
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0 && !root.querySelector('#root-loader')) {
          document.getElementById('static-landing').style.display = 'none';
          root.style.display = '';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      // Fallback: after 8s, show React root regardless
      setTimeout(function() {
        var sl = document.getElementById('static-landing');
        var root = document.getElementById('root');
        if (sl) sl.style.display = 'none';
        if (root) root.style.display = '';
        observer.disconnect();
      }, 8000);
    </script>
  </body>
