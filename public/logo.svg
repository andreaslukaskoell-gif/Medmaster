<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1b3ea7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="m-grad" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="inner-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>

  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="96" fill="white" opacity="0.06"/>

  <!-- M letterform — bold architectural style -->
  <path
    d="M128 384 L128 160 L200 160 L256 264 L312 160 L384 160 L384 384 L328 384 L328 248 L272 348 L240 348 L184 248 L184 384 Z"
    fill="url(#m-grad)"
  />

  <!-- Small medical cross accent — top right of M -->
  <g transform="translate(370, 128)">
    <rect x="-3" y="-12" width="6" height="24" rx="2" fill="#60a5fa"/>
    <rect x="-12" y="-3" width="24" height="6" rx="2" fill="#60a5fa"/>
  </g>
</svg>
