<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="system-ui, sans-serif">
  <rect width="600" height="520" fill="#f8fafc" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Spermatogenese &amp; Oogenese im Vergleich</text>

  <!-- Column headers -->
  <rect x="20" y="45" width="270" height="32" fill="#3b82f6" fill-opacity="0.12" rx="6"/>
  <text x="155" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Spermatogenese</text>
  <rect x="310" y="45" width="270" height="32" fill="#ec4899" fill-opacity="0.12" rx="6"/>
  <text x="445" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#be185d">Oogenese</text>

  <!-- Divider -->
  <line x1="300" y1="50" x2="300" y2="500" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === SPERMATOGENESE (left) === -->
  <!-- Spermatogonie -->
  <circle cx="155" cy="110" r="22" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">2n</text>
  <text x="155" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Spermatogonie</text>
  <text x="155" y="162" text-anchor="middle" font-size="9" fill="#64748b">(Stammzelle, diploid)</text>

  <!-- Arrow: Mitose -->
  <line x1="155" y1="168" x2="155" y2="190" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="183" font-size="9" fill="#64748b" font-style="italic">Mitose</text>

  <!-- Primäre Spermatozyte -->
  <circle cx="155" cy="215" r="20" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="219" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">2n</text>
  <text x="155" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Primäre Spermatozyte</text>

  <!-- Arrow: Meiose I -->
  <line x1="155" y1="256" x2="120" y2="290" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="155" y1="256" x2="190" y2="290" stroke="#dc2626" stroke-width="1.5"/>
  <text x="215" y="278" font-size="9" fill="#dc2626" font-weight="600">Meiose I</text>

  <!-- Sekundäre Spermatozyten -->
  <circle cx="120" cy="310" r="16" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="314" text-anchor="middle" font-size="8" font-weight="600" fill="#1e40af">n</text>
  <circle cx="190" cy="310" r="16" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="314" text-anchor="middle" font-size="8" font-weight="600" fill="#1e40af">n</text>
  <text x="155" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Sekundäre Spermatozyten</text>

  <!-- Arrow: Meiose II -->
  <line x1="120" y1="330" x2="90" y2="370" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="120" y1="330" x2="140" y2="370" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="190" y1="330" x2="170" y2="370" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="190" y1="330" x2="220" y2="370" stroke="#dc2626" stroke-width="1.2"/>
  <text x="245" y="358" font-size="9" fill="#dc2626" font-weight="600">Meiose II</text>

  <!-- 4 Spermatiden -->
  <circle cx="90" cy="388" r="12" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="140" cy="388" r="12" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="170" cy="388" r="12" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="220" cy="388" r="12" fill="#60a5fa" stroke="#2563eb" stroke-width="1.5"/>
  <text x="90" y="392" text-anchor="middle" font-size="7" font-weight="600" fill="white">n</text>
  <text x="140" y="392" text-anchor="middle" font-size="7" font-weight="600" fill="white">n</text>
  <text x="170" y="392" text-anchor="middle" font-size="7" font-weight="600" fill="white">n</text>
  <text x="220" y="392" text-anchor="middle" font-size="7" font-weight="600" fill="white">n</text>
  <text x="155" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">4 Spermatiden</text>

  <!-- Arrow: Differenzierung -->
  <line x1="155" y1="424" x2="155" y2="448" stroke="#64748b" stroke-width="1.5"/>
  <text x="210" y="440" font-size="9" fill="#64748b" font-style="italic">Differenzierung</text>

  <!-- 4 Spermien -->
  <g fill="#2563eb" font-size="14">
    <text x="82" y="470">&#x1F4A7;</text>
    <text x="122" y="470">&#x1F4A7;</text>
    <text x="162" y="470">&#x1F4A7;</text>
    <text x="202" y="470">&#x1F4A7;</text>
  </g>
  <text x="155" y="498" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">4 Spermien (n)</text>

  <!-- === OOGENESE (right) === -->
  <!-- Oogonie -->
  <circle cx="445" cy="110" r="22" fill="#fbcfe8" stroke="#ec4899" stroke-width="2"/>
  <text x="445" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#9d174d">2n</text>
  <text x="445" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Oogonie</text>
  <text x="445" y="162" text-anchor="middle" font-size="9" fill="#64748b">(Stammzelle, diploid)</text>

  <!-- Arrow: Mitose -->
  <line x1="445" y1="168" x2="445" y2="190" stroke="#64748b" stroke-width="1.5"/>
  <text x="495" y="183" font-size="9" fill="#64748b" font-style="italic">Mitose</text>

  <!-- Primäre Oozyte -->
  <circle cx="445" cy="215" r="20" fill="#f9a8d4" stroke="#ec4899" stroke-width="2"/>
  <text x="445" y="219" text-anchor="middle" font-size="9" font-weight="600" fill="#9d174d">2n</text>
  <text x="445" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Primäre Oozyte</text>
  <text x="445" y="261" text-anchor="middle" font-size="8" fill="#94a3b8">Arrest: Prophase I (bis Pubertät)</text>

  <!-- Arrow: Meiose I -->
  <line x1="445" y1="268" x2="410" y2="296" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="445" y1="268" x2="510" y2="296" stroke="#dc2626" stroke-width="1.5"/>
  <text x="530" y="286" font-size="9" fill="#dc2626" font-weight="600">Meiose I</text>

  <!-- Sekundäre Oozyte + 1. Polkörper -->
  <circle cx="410" cy="316" r="18" fill="#f9a8d4" stroke="#ec4899" stroke-width="1.5"/>
  <text x="410" y="320" text-anchor="middle" font-size="8" font-weight="600" fill="#9d174d">n</text>
  <circle cx="510" cy="310" r="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="510" y="313" text-anchor="middle" font-size="6" fill="#9d174d">PK</text>
  <text x="410" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Sekundäre Oozyte</text>
  <text x="540" y="313" font-size="9" fill="#94a3b8">1. Polkörper</text>
  <text x="410" y="361" text-anchor="middle" font-size="8" fill="#94a3b8">Arrest: Metaphase II</text>

  <!-- Arrow: Meiose II (nur bei Befruchtung!) -->
  <line x1="410" y1="368" x2="380" y2="400" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="410" y1="368" x2="470" y2="400" stroke="#dc2626" stroke-width="1.2"/>
  <text x="530" y="388" font-size="9" fill="#dc2626" font-weight="600">Meiose II</text>
  <text x="530" y="400" font-size="8" fill="#94a3b8">(nur bei Befruchtung)</text>

  <!-- Reife Eizelle + 2. Polkörper -->
  <circle cx="380" cy="430" r="24" fill="#f472b6" stroke="#db2777" stroke-width="2"/>
  <text x="380" y="434" text-anchor="middle" font-size="9" font-weight="600" fill="white">n</text>
  <circle cx="470" cy="420" r="7" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="470" y="423" text-anchor="middle" font-size="5" fill="#9d174d">PK</text>
  <text x="495" y="423" font-size="9" fill="#94a3b8">2. Polkörper</text>

  <text x="380" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#be185d">1 Eizelle (n)</text>
  <text x="380" y="484" text-anchor="middle" font-size="9" fill="#64748b">+ 2-3 Polkörper (degenerieren)</text>

  <!-- Key difference box -->
  <rect x="170" y="500" width="260" height="18" fill="#fef3c7" rx="4"/>
  <text x="300" y="514" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Ergebnis: 4 Spermien vs. 1 Eizelle + Polkörper</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
