<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b9080"/>
      <stop offset="35%" stop-color="#2d6a4f"/>
      <stop offset="65%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#b5351b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" rx="12" fill="#f8f6f0"/>

  <!-- Title -->
  <text x="250" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Bakterienwachstumskurve</text>

  <!-- Axes -->
  <line x1="70" y1="250" x2="470" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="250" x2="70" y2="40" stroke="#333" stroke-width="1.5"/>

  <!-- Arrow tips -->
  <polygon points="470,250 462,246 462,254" fill="#333"/>
  <polygon points="70,40 66,48 74,48" fill="#333"/>

  <!-- Y-axis label -->
  <text x="30" y="145" text-anchor="middle" font-size="11" fill="#333" font-weight="600" transform="rotate(-90,30,145)">Zellzahl (log)</text>

  <!-- X-axis label -->
  <text x="270" y="275" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Zeit</text>

  <!-- Y-axis ticks -->
  <line x1="65" y1="220" x2="70" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="180" x2="70" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="140" x2="70" y2="140" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="100" x2="70" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="60" x2="70" y2="60" stroke="#333" stroke-width="1"/>

  <!-- Phase dividers (dashed vertical lines) -->
  <line x1="145" y1="45" x2="145" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="255" y1="45" x2="255" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="370" y1="45" x2="370" y2="250" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Phase labels -->
  <rect x="75" y="34" width="65" height="18" rx="4" fill="#e8f5e9"/>
  <text x="108" y="47" text-anchor="middle" font-size="9" font-weight="600" fill="#2d6a4f">Lag-Phase</text>

  <rect x="152" y="34" width="97" height="18" rx="4" fill="#c8e6c9"/>
  <text x="200" y="47" text-anchor="middle" font-size="9" font-weight="600" fill="#1b4332">Log-Phase (exp.)</text>

  <rect x="262" y="34" width="102" height="18" rx="4" fill="#fff3e0"/>
  <text x="313" y="47" text-anchor="middle" font-size="9" font-weight="600" fill="#6b4226">Stationäre Phase</text>

  <rect x="377" y="34" width="88" height="18" rx="4" fill="#fce4ec"/>
  <text x="421" y="47" text-anchor="middle" font-size="9" font-weight="600" fill="#b5351b">Absterbephase</text>

  <!-- Growth curve (S-shaped then declining) -->
  <!-- Lag phase: nearly flat -->
  <!-- Log phase: steep rise -->
  <!-- Stationary: plateau -->
  <!-- Death: decline -->
  <path d="M75,220
           C90,220 120,218 145,215
           C165,210 185,180 200,140
           C215,100 235,80 255,72
           C275,68 310,68 340,70
           C355,70 365,70 370,72
           C385,75 410,110 440,150
           C450,165 460,180 465,190"
        stroke="url(#curveGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Annotations -->
  <!-- Lag: enzyme synthesis -->
  <text x="108" y="235" text-anchor="middle" font-size="8" fill="#666" font-style="italic">Anpassung</text>

  <!-- Log: max growth -->
  <text x="200" y="165" text-anchor="middle" font-size="8" fill="#1b4332" font-style="italic">max. Teilungsrate</text>

  <!-- Stationary: N ≈ K -->
  <line x1="255" y1="72" x2="370" y2="72" stroke="#6b4226" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="313" y="90" text-anchor="middle" font-size="9" fill="#6b4226" font-weight="500">N ≈ K</text>

  <!-- Death -->
  <text x="430" y="135" text-anchor="middle" font-size="8" fill="#b5351b" font-style="italic">Ressourcen</text>
  <text x="430" y="146" text-anchor="middle" font-size="8" fill="#b5351b" font-style="italic">erschöpft</text>

  <!-- K line (dashed) -->
  <line x1="70" y1="68" x2="470" y2="68" stroke="#999" stroke-width="0.8" stroke-dasharray="6,4"/>
  <text x="478" y="72" font-size="9" fill="#666" font-weight="600">K</text>
</svg>