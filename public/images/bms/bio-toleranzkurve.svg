<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="320" fill="url(#bg)" rx="8"/>

  <!-- Axes -->
  <line x1="60" y1="260" x2="560" y2="260" stroke="#334155" stroke-width="2"/>
  <line x1="60" y1="260" x2="60" y2="30" stroke="#334155" stroke-width="2"/>
  <polygon points="60,25 55,35 65,35" fill="#334155"/>
  <polygon points="565,260 555,255 555,265" fill="#334155"/>

  <!-- Axis labels -->
  <text x="310" y="295" text-anchor="middle" font-size="13" fill="#334155" font-weight="600">Intensität des Umweltfaktors (z.B. Temperatur)</text>
  <text x="18" y="145" text-anchor="middle" font-size="13" fill="#334155" font-weight="600" transform="rotate(-90,18,145)">Leistung / Vitalität</text>

  <!-- Bell curve (tolerance curve) -->
  <path d="M 80,258 Q 120,255 160,240 Q 200,210 240,140 Q 280,60 310,40 Q 340,60 370,140 Q 410,210 450,240 Q 490,255 530,258" fill="none" stroke="#2563eb" stroke-width="3"/>
  <path d="M 80,258 Q 120,255 160,240 Q 200,210 240,140 Q 280,60 310,40 Q 340,60 370,140 Q 410,210 450,240 Q 490,255 530,258 L 530,260 L 80,260 Z" fill="#2563eb" fill-opacity="0.08"/>

  <!-- Zone shadings -->
  <rect x="80" y="30" width="80" height="228" fill="#ef4444" fill-opacity="0.08" rx="2"/>
  <rect x="450" y="30" width="80" height="228" fill="#ef4444" fill-opacity="0.08" rx="2"/>
  <rect x="230" y="30" width="150" height="228" fill="#22c55e" fill-opacity="0.1" rx="2"/>

  <!-- Zone labels -->
  <text x="120" y="50" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">Pessimum</text>
  <text x="490" y="50" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">Pessimum</text>
  <text x="305" y="50" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">Optimum</text>
  <text x="305" y="65" text-anchor="middle" font-size="10" fill="#16a34a">(Präferendum)</text>

  <!-- Dashed lines for zones -->
  <line x1="160" y1="40" x2="160" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="40" x2="230" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="380" y1="40" x2="380" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="40" x2="450" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Lethal limits -->
  <line x1="80" y1="40" x2="80" y2="258" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="530" y1="40" x2="530" y2="258" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="80" y="278" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">Letale</text>
  <text x="80" y="288" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">Grenze</text>
  <text x="530" y="278" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">Letale</text>
  <text x="530" y="288" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">Grenze</text>

  <!-- Tolerance range bracket -->
  <line x1="160" y1="240" x2="450" y2="240" stroke="#334155" stroke-width="1.5"/>
  <line x1="160" y1="236" x2="160" y2="244" stroke="#334155" stroke-width="1.5"/>
  <line x1="450" y1="236" x2="450" y2="244" stroke="#334155" stroke-width="1.5"/>
  <text x="305" y="253" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">Toleranzbereich (ökologische Amplitude)</text>

  <!-- Stenök / Euryök examples -->
  <text x="540" y="15" text-anchor="end" font-size="9" fill="#64748b">stenök = eng</text>
  <text x="540" y="26" text-anchor="end" font-size="9" fill="#64748b">euryök = breit</text>
</svg>
