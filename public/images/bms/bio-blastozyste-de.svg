<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="system-ui, sans-serif">
  <defs>
    <radialGradient id="zona" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="transparent"/>
      <stop offset="86%" stop-color="#fde68a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="cavity" cx="55%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </radialGradient>
  </defs>

  <rect width="520" height="400" fill="#f8fafc" rx="8"/>
  <text x="260" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Blastozyste (Tag 5-6)</text>

  <!-- Zona pellucida (outer shell) -->
  <ellipse cx="220" cy="210" rx="155" ry="145" fill="none" stroke="#d97706" stroke-width="6" stroke-dasharray="8,4" opacity="0.6"/>
  <ellipse cx="220" cy="210" rx="148" ry="138" fill="url(#cavity)"/>

  <!-- Trophoblast cells (outer ring) -->
  <g fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5">
    <!-- Top arc -->
    <circle cx="120" cy="85" r="11"/><circle cx="145" cy="76" r="11"/><circle cx="172" cy="72" r="10"/>
    <circle cx="198" cy="70" r="11"/><circle cx="225" cy="69" r="10"/><circle cx="252" cy="72" r="11"/>
    <circle cx="278" cy="76" r="10"/><circle cx="302" cy="85" r="11"/><circle cx="322" cy="97" r="10"/>
    <!-- Right arc -->
    <circle cx="338" cy="114" r="11"/><circle cx="350" cy="135" r="10"/><circle cx="357" cy="158" r="11"/>
    <circle cx="360" cy="183" r="10"/><circle cx="358" cy="208" r="11"/><circle cx="352" cy="233" r="10"/>
    <circle cx="342" cy="256" r="11"/><circle cx="328" cy="276" r="10"/><circle cx="310" cy="293" r="11"/>
    <!-- Bottom arc -->
    <circle cx="288" cy="306" r="10"/><circle cx="264" cy="315" r="11"/><circle cx="238" cy="320" r="10"/>
    <circle cx="212" cy="321" r="11"/><circle cx="186" cy="318" r="10"/><circle cx="160" cy="310" r="11"/>
    <circle cx="137" cy="298" r="10"/><circle cx="118" cy="282" r="11"/>
    <!-- Left arc -->
    <circle cx="103" cy="263" r="10"/><circle cx="90" cy="240" r="11"/><circle cx="82" cy="216" r="10"/>
    <circle cx="78" cy="190" r="11"/><circle cx="80" cy="164" r="10"/><circle cx="86" cy="140" r="11"/>
    <circle cx="96" cy="118" r="10"/><circle cx="108" cy="100" r="11"/>
  </g>

  <!-- Inner Cell Mass (Embryoblast) - cluster at one pole -->
  <g fill="#a78bfa" stroke="#7c3aed" stroke-width="1.5">
    <circle cx="135" cy="140" r="14"/>
    <circle cx="160" cy="130" r="15"/>
    <circle cx="148" cy="160" r="13"/>
    <circle cx="175" cy="148" r="14"/>
    <circle cx="140" cy="118" r="12"/>
    <circle cx="165" cy="112" r="13"/>
    <circle cx="185" cy="125" r="12"/>
    <circle cx="190" cy="145" r="11"/>
    <circle cx="170" cy="168" r="12"/>
    <circle cx="152" cy="105" r="11"/>
    <circle cx="130" cy="160" r="11"/>
  </g>

  <!-- Labels with leader lines -->
  <!-- Trophoblast -->
  <line x1="350" y1="135" x2="420" y2="90" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="420" cy="90" r="3" fill="#3b82f6"/>
  <text x="425" y="85" font-size="13" font-weight="600" fill="#1d4ed8">Trophoblast</text>
  <text x="425" y="100" font-size="10" fill="#64748b">(wird Plazenta)</text>

  <!-- Embryoblast -->
  <line x1="185" y1="125" x2="410" y2="160" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="410" cy="160" r="3" fill="#7c3aed"/>
  <text x="415" y="155" font-size="13" font-weight="600" fill="#6d28d9">Embryoblast</text>
  <text x="415" y="170" font-size="10" fill="#64748b">(wird Embryo)</text>

  <!-- Blastozoel -->
  <text x="270" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">Blastozoel</text>
  <text x="270" y="255" text-anchor="middle" font-size="10" fill="#64748b">(Hohlraum)</text>

  <!-- Zona pellucida -->
  <line x1="80" y1="340" x2="80" y2="310" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="15" y="358" font-size="13" font-weight="600" fill="#b45309">Zona pellucida</text>
  <text x="15" y="373" font-size="10" fill="#64748b">(Glykoproteinhülle)</text>

  <!-- Legend box -->
  <rect x="380" y="280" width="130" height="100" fill="white" fill-opacity="0.8" stroke="#e2e8f0" rx="6"/>
  <text x="445" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Legende</text>
  <circle cx="398" cy="316" r="7" fill="#93c5fd" stroke="#3b82f6" stroke-width="1"/>
  <text x="412" y="320" font-size="10" fill="#334155">Trophoblast</text>
  <circle cx="398" cy="338" r="7" fill="#a78bfa" stroke="#7c3aed" stroke-width="1"/>
  <text x="412" y="342" font-size="10" fill="#334155">Embryoblast</text>
  <circle cx="398" cy="360" r="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="412" y="364" font-size="10" fill="#334155">Blastozoel</text>
</svg>
