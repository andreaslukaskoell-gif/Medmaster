<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#555"/>
    </marker>
    <marker id="arrSun" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#f9a825"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Nahrungsnetz — Energiefluss</text>

  <!-- Legend -->
  <rect x="30" y="520" width="14" height="14" fill="#4caf50" rx="2"/>
  <text x="50" y="532" font-size="12" fill="#444">Produzenten</text>
  <rect x="150" y="520" width="14" height="14" fill="#42a5f5" rx="2"/>
  <text x="170" y="532" font-size="12" fill="#444">Primärkonsumenten</text>
  <rect x="310" y="520" width="14" height="14" fill="#ffa726" rx="2"/>
  <text x="330" y="532" font-size="12" fill="#444">Sekundärkonsumenten</text>
  <rect x="500" y="520" width="14" height="14" fill="#ef5350" rx="2"/>
  <text x="520" y="532" font-size="12" fill="#444">Tertiärkonsumenten</text>

  <!-- Sonne -->
  <circle cx="400" cy="80" r="38" fill="#fdd835" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#5d4037">Sonne</text>
  <text x="400" y="93" text-anchor="middle" font-size="11" fill="#5d4037">(Lichtenergie)</text>

  <!-- Pflanzen (Produzenten) -->
  <rect x="305" y="185" width="190" height="55" rx="10" fill="#4caf50" stroke="#388e3c" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Pflanzen</text>
  <text x="400" y="230" text-anchor="middle" font-size="12" fill="#e8f5e9">(Produzenten)</text>

  <!-- Sonne → Pflanzen -->
  <line x1="400" y1="118" x2="400" y2="183" stroke="#f9a825" stroke-width="2.5" marker-end="url(#arrSun)"/>

  <!-- Hase (Primärkonsument) -->
  <rect x="130" y="320" width="150" height="50" rx="10" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
  <text x="205" y="345" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Hase</text>
  <text x="205" y="363" text-anchor="middle" font-size="12" fill="#e3f2fd">(Herbivore)</text>

  <!-- Maus (Primärkonsument) -->
  <rect x="520" y="320" width="150" height="50" rx="10" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
  <text x="595" y="345" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Maus</text>
  <text x="595" y="363" text-anchor="middle" font-size="12" fill="#e3f2fd">(Herbivore)</text>

  <!-- Pflanzen → Hase -->
  <line x1="340" y1="240" x2="240" y2="318" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Pflanzen → Maus -->
  <line x1="460" y1="240" x2="560" y2="318" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Fuchs (Sekundärkonsument) -->
  <rect x="80" y="445" width="150" height="50" rx="10" fill="#ffa726" stroke="#f57c00" stroke-width="1.5"/>
  <text x="155" y="468" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Fuchs</text>
  <text x="155" y="487" text-anchor="middle" font-size="12" fill="#fff3e0">(Karnivore)</text>

  <!-- Eule (Sekundärkonsument) -->
  <rect x="570" y="445" width="150" height="50" rx="10" fill="#ffa726" stroke="#f57c00" stroke-width="1.5"/>
  <text x="645" y="468" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Eule</text>
  <text x="645" y="487" text-anchor="middle" font-size="12" fill="#fff3e0">(Karnivore)</text>

  <!-- Hase → Fuchs -->
  <line x1="190" y1="370" x2="165" y2="443" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Maus → Eule -->
  <line x1="610" y1="370" x2="635" y2="443" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Adler (Tertiärkonsument) -->
  <rect x="320" y="445" width="160" height="50" rx="10" fill="#ef5350" stroke="#c62828" stroke-width="1.5"/>
  <text x="400" y="468" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Adler</text>
  <text x="400" y="487" text-anchor="middle" font-size="12" fill="#ffebee">(Spitzenprädator)</text>

  <!-- Fuchs → Adler -->
  <line x1="230" y1="470" x2="318" y2="470" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Eule → Adler -->
  <line x1="570" y1="470" x2="482" y2="470" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Hase → Adler (cross arrow) -->
  <line x1="230" y1="350" x2="340" y2="448" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <!-- Maus → Adler (cross arrow) -->
  <line x1="570" y1="350" x2="460" y2="448" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
</svg>
