<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-bio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-bio)"/>

  <!-- Decorative element: DNA helix lines -->
  <path d="M 900 50 Q 950 100 900 150" stroke="#34d399" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 950 50 Q 900 100 950 150" stroke="#34d399" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 900 200 Q 950 250 900 300" stroke="#34d399" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 950 200 Q 900 250 950 300" stroke="#34d399" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Subject emoji -->
  <text x="1000" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="120" opacity="0.15">🧬</text>

  <!-- MedMaster branding -->
  <text x="100" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="bold" fill="white">MedMaster</text>

  <!-- Subject name -->
  <text x="100" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#34d399">Biologie</text>

  <!-- Subtitle -->
  <text x="100" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#d1fae5">Kostenlose MedAT-Übungsfragen</text>

  <!-- Question count -->
