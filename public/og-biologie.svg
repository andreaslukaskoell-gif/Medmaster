  <!-- Secondary branding -->
  <text x="100" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#d1fae5">Vorbereitung für die österreichische Aufnahmeprüfung</text>

  <!-- Accent bar in navy -->
  <rect x="100" y="520" width="120" height="6" rx="3" fill="#1b3ea7"/>
