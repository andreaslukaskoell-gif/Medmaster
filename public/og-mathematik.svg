<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-math" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-math)"/>

  <!-- Decorative element: Math graph -->
  <path d="M 900 200 L 920 150 L 940 170 L 960 120 L 980 160" stroke="#d8b4fe" stroke-width="3" fill="none" opacity="0.6"/>
  <circle cx="900" cy="200" r="4" fill="#d8b4fe" opacity="0.6"/>
  <circle cx="920" cy="150" r="4" fill="#d8b4fe" opacity="0.6"/>
  <circle cx="940" cy="170" r="4" fill="#d8b4fe" opacity="0.6"/>
  <circle cx="960" cy="120" r="4" fill="#d8b4fe" opacity="0.6"/>
  <circle cx="980" cy="160" r="4" fill="#d8b4fe" opacity="0.6"/>

  <!-- Subject emoji -->
  <text x="1000" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="120" opacity="0.15">∑</text>

  <!-- MedMaster branding -->
  <text x="100" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="bold" fill="white">MedMaster</text>

  <!-- Subject name -->
  <text x="100" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#d8b4fe">Mathematik</text>

  <!-- Subtitle -->
  <text x="100" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#f3e8ff">Kostenlose MedAT-Übungsfragen</text>

  <!-- Question count -->
  <text x="100" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#e9d5ff">490+ Fragen • Mit Erklärungen</text>

  <!-- Secondary branding -->
  <text x="100" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#f3e8ff">Vorbereitung für die österreichische Aufnahmeprüfung</text>

  <!-- Accent bar in navy -->
  <rect x="100" y="520" width="120" height="6" rx="3" fill="#1b3ea7"/>
