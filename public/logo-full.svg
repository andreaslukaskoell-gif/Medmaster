      <rect x="-5" y="-1.5" width="10" height="3" rx="1" fill="#60a5fa"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text
    x="88"
    y="53"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="800"
