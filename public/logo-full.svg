<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 80" fill="none">
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1b3ea7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="icon-m" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (64x64) -->
  <g transform="translate(8, 8)">
    <rect width="64" height="64" rx="14" fill="url(#icon-bg)"/>
    <rect width="64" height="32" rx="14" fill="white" opacity="0.06"/>

    <!-- M -->
    <path
