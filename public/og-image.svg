<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1b3ea7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="m-bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="400" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(100, 160)">
    <rect width="80" height="80" rx="18" fill="white" opacity="0.15"/>
    <path
      d="M20 62 L20 22 L31 22 L40 38 L49 22 L60 22 L60 62 L51 62 L51 37 L42 53 L38 53 L29 37 L29 62 Z"
      fill="white"
    />
    <g transform="translate(58, 18)">
      <rect x="-2" y="-6" width="4" height="12" rx="1.5" fill="#60a5fa"/>
      <rect x="-6" y="-2" width="12" height="4" rx="1.5" fill="#60a5fa"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="200" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-0.02em">MedMaster</text>

  <!-- Tagline -->
  <text x="100" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#93c5fd" font-weight="500">MedAT 2026 Vorbereitung</text>

  <!-- Stats bar -->
  <text x="100" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#bfdbfe">4.300+ BMS-Fragen · 10.000+ KFF-Übungen · Alle 4 Bereiche</text>

  <!-- Accent line -->
  <rect x="100" y="430" width="160" height="4" rx="2" fill="#60a5fa"/>

  <!-- Price badge -->
  <g transform="translate(100, 470)">
    <rect width="280" height="48" rx="24" fill="white" opacity="0.12"/>
    <text x="24" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" font-weight="600">Einmalig €29,90 · Kein Abo</text>
  </g>
</svg>
